<section class="form-section" id="sec-05">
  <div class="fs-head">
    <span class="fs-num">05</span>
    <span class="fs-title">Гидроколлоид и соли</span>
    <span class="fs-meta">соли-плавители · крахмал · NaCl</span>
  </div>
  <div class="fs-body">
    <div class="field-divider">Соли-плавители</div>
    <table class="perevar-tbl" formArrayName="emulsifiers">
      <thead>
        <tr><th>Тип</th><th>Масса, кг</th><th></th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of emulsifiers.controls; let i = index" [formGroupName]="i">
          <td data-label="Тип">
            <select formControlName="type" class="inp">
              <option value="">— выбрать —</option>
              <option *ngFor="let et of emulsifierTypes" [value]="et.value">{{ et.label }}</option>
            </select>
          </td>
          <td data-label="Масса, кг">
            <input formControlName="mass" class="inp numeric" type="number" min="0" max="10" step="0.01">
          </td>
          <td>
            <button type="button" class="del-btn" (click)="removeEmulsifier.emit(i)">×</button>
          </td>
        </tr>
      </tbody>
    </table>
    <button type="button" class="add-row-btn" [disabled]="emulsifiers.length >= emulsLimit"
            (click)="addEmulsifier.emit()">+ Добавить соль-плавитель</button>

    <div class="field-divider">Крахмал и соль</div>
    <div class="field-row">
      <div class="field">
        <label class="field-label">Крахмал — тип и масса</label>
        <div class="compound">
          <select formControlName="starch_type" class="inp">
            <option value="kmc_high_melt">KMC High Melt</option>
            <option value="other">Другой крахмал</option>
          </select>
          <input formControlName="m_starch" class="inp numeric" type="number" step="0.1" min="0" max="50" placeholder="кг">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Соль пищевая NaCl<span class="unit">кг</span></label>
        <input formControlName="m_salt" [class]="'inp numeric ' + saltStatus.cls"
               type="number" step="0.01" min="0" max="10">
        <span [class]="saltStatus.helperCls">{{ saltStatus.helperText }}</span>
      </div>
    </div>
  </div>
</section>
