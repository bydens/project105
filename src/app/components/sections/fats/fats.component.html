<section class="form-section" id="sec-04">
  <div class="fs-head">
    <span class="fs-num">04</span>
    <span class="fs-title">Жировая фаза</span>
    <span class="fs-meta">по внешним весам</span>
  </div>
  <div class="fs-body">
    <table class="perevar-tbl" formArrayName="fats">
      <thead>
        <tr><th>Тип жира</th><th>Масса, кг</th><th></th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of fats.controls; let i = index" [formGroupName]="i">
          <td data-label="Тип жира">
            <select formControlName="type" class="inp">
              <option value="">— выбрать —</option>
              <option *ngFor="let ft of fatTypes" [value]="ft.value">{{ ft.label }}</option>
            </select>
          </td>
          <td data-label="Масса, кг">
            <input formControlName="mass" class="inp numeric" type="number" min="0" max="100" step="0.1">
          </td>
          <td>
            <button type="button" class="del-btn" (click)="removeFat.emit(i)">×</button>
          </td>
        </tr>
      </tbody>
    </table>
    <button type="button" class="add-row-btn" [disabled]="fats.length >= fatLimit" (click)="addFat.emit()">
      + Добавить жир
    </button>
    <span class="helper" style="margin-left:8px">макс. {{ fatLimit }} позиции</span>
  </div>
</section>
